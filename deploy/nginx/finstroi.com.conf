# Next.js standalone (PM2) → 127.0.0.1:3000
# Статика: /home/new/.next/standalone/
#
# Установка:
#   sudo cp deploy/nginx/finstroi.com.conf /etc/nginx/sites-available/finstroi.com.conf
#   sudo ln -sf /etc/nginx/sites-available/finstroi.com.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (если сертификата ещё нет):
#   sudo certbot --nginx -d finstroi.com

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

upstream new_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name finstroi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name finstroi.com;

    ssl_certificate /etc/letsencrypt/live/finstroi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finstroi.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;
    client_header_buffer_size 32k;
    large_client_header_buffers 4 32k;

    # JS/CSS чанки Next.js (immutable, с хешами в имени)
    location /_next/static/ {
        alias /home/new/.next/standalone/.next/static/;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Файлы из public/ (icons, images, maps, suppliers и т.д.)
    location / {
        root /home/new/.next/standalone/public;
        try_files $uri @nextjs;
    }

    # Страницы, /api/*, image optimizer, всё остальное
    location @nextjs {
        proxy_pass http://new_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
